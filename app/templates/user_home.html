    </style>
</head>

<body>
    <!-- Modern Navigation -->
    <nav class="modern-nav">
        <div class="nav-container">
            <a href="{{ url_for('welcome') }}" class="nav-logo"
                onclick="localStorage.clear(); sessionStorage.clear();">Vite<span>Go</span></a>
            <div class="nav-actions">
                <span class="nav-user">👋 {{ current_user.username }}</span>
                <a href="{{ url_for('payment') }}" class="nav-btn nav-btn-secondary">Ride History</a>
                <a href="{{ url_for('chat') }}" class="nav-btn nav-btn-secondary">My Rides</a>
                <a href="{{ url_for('logout') }}" class="nav-btn nav-btn-primary"
                    onclick="localStorage.clear();">Logout</a>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="modern-container">
        <div class="page-grid">
            <!-- Left Panel - Booking Form -->
            <div class="booking-panel">
                <div class="modern-card fade-in">
                    <div class="card-header">
                        <h1 class="card-title">Book Your Ride</h1>
                        <p class="card-subtitle">Fast, reliable rides at your fingertips</p>
                    </div>

                    <form id="distance_form" class="booking-form">
                        <!-- Error Message -->
                        <div id="validation-error" class="error-message">
                            <span>⚠️</span>
                            <span id="error-text"></span>
                        </div>

                        <!-- Route summary (used for non-driving modes) -->
                        <div id="route-summary" class="error-message"
                            style="background: rgba(255,255,255,0.75); border-color: rgba(0,0,0,0.08); color: #1c1917;">
                            <span>🗺️</span>
                            <span id="route-summary-text"></span>
                        </div>

                        <div class="form-group">
                            <label class="form-label">📍 Pickup Location</label>
                            <input class="form-input" id="from_places" placeholder="Enter pickup address" />
                            <input id="origin" name="origin" required type="hidden" />
                            <button type="button" class="location-btn" onclick="getCurrentPosition()">
                                📌 Use Current Location
                            </button>
                        </div>

                        <div class="form-group">
                            <label class="form-label">🎯 Dropoff Location</label>
                            <input class="form-input" id="to_places" placeholder="Enter destination" />
                            <input id="destination" name="destination" required type="hidden" />
                        </div>

                        <div class="form-group">
                            <label class="form-label">🕐 Pickup Time</label>
                            <button type="button" class="datetime-toggle" onclick="openTimePickerModal()">
                                ⏰ Schedule Pickup
                            </button>
                            <input type='hidden' id="selected_datetime" value="" />
                        </div>

                        <!-- Time Picker Modal -->
                        <div id="timePickerModal" class="time-modal">
                            <div class="time-modal-backdrop" onclick="closeTimePickerModal()"></div>
                            <div class="time-modal-content">
                                <div class="time-modal-header">
                                    <h3>🕐 Schedule Your Pickup</h3>
                                    <button type="button" class="time-modal-close"
                                        onclick="closeTimePickerModal()">✕</button>
                                </div>
                                <div class="time-modal-body">
                                    <div class="quick-time-options">
                                        <button type="button" class="quick-time-btn" onclick="setQuickTime(5)">
                                            <span class="quick-icon">⚡</span>
                                            <span>Now</span>
                                            <small>~5 min</small>
                                        </button>
                                        <button type="button" class="quick-time-btn" onclick="setQuickTime(15)">
                                            <span class="quick-icon">☕</span>
                                            <span>Soon</span>
                                            <small>~15 min</small>
                                        </button>
                                        <button type="button" class="quick-time-btn" onclick="setQuickTime(30)">
                                            <span class="quick-icon">📅</span>
                                            <span>Later</span>
                                            <small>~30 min</small>
                                        </button>
                                    </div>
                                    <div class="custom-time-trigger">
                                        <label class="form-label">Selected time:</label>
                                        <button type="button" class="custom-time-btn" onclick="toggleCustomTimePopup()">
                                            <span id="display_time">Choose custom time...</span>
                                            <span class="calendar-icon">📅</span>
                                        </button>
                                        <input type='hidden' id="custom_datetime" />
                                    </div>
                                </div>
                                <!-- Custom Time Popup -->
                                <div id="customTimePopup" class="custom-time-popup">
                                    <button type="button" class="popup-close-simple"
                                        onclick="closeCustomTimePopup()">✕</button>
                                    <div id="inline-calendar"></div>
                                </div>
                                <div class="time-modal-footer">
                                    <button type="button" class="btn-action btn-action-secondary"
                                        onclick="closeTimePickerModal()">Cancel</button>
                                    <button type="button" class="btn-action btn-action-primary"
                                        onclick="confirmTimeSelection()">Confirm Time</button>
                                </div>
                            </div>
                        </div>

                        <div class="form-group">
                            <label class="form-label">🚗 Travel Mode</label>
                            <select class="form-input" id="travel_mode" name="travel_mode">
                                <option value="DRIVING">🚗 Driving</option>
                                <option value="WALKING">🚶 Walking</option>
                                <option value="BICYCLING">🚴 Bicycle</option>
                                <option value="TRANSIT">🚌 Transit</option>
                            </select>
                        </div>

                        <button class="btn-modern btn-modern-primary" type="submit" style="width: 100%;">
                            Get Travel Options
                            <span>→</span>
                        </button>
                    </form>

                    <!-- Selected Car Display -->
                    <div id="ride_request" class="selected-car-section" style="display: none;">
                        <div class="selected-car-header">
                            <div class="check-icon">✓</div>
                            <h3>Your Selected Ride</h3>
                        </div>
                        <div id="selected_car"></div>
                        <div class="selected-car-actions">
                            <button class="btn-action btn-action-secondary" onclick="deselectRide()">
                                <span class="btn-icon">↺</span>
                                <span>Change</span>
                            </button>
                            <button class="btn-action btn-action-primary" onclick="requestRide()">
                                <span class="btn-icon">✓</span>
                                <span>Confirm</span>
                            </button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Right Panel - Map -->
            <div class="map-panel fade-in">
                <div class="map-container">
                    <div id="map"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Car Selection Modal -->
    <div id="carModal" class="car-modal">
        <div id="car_list" class="car-list"></div>
    </div>

    <!-- Modern Shared JS -->
    <script src="{{ url_for('static', filename='scripts/modern_shared.js') }}"></script>

    <!-- Page Scripts -->
    <script>
        $(document).ready(function () {
            var currentUsername = "{{ current_user.username }}";
            $('body').data('currentUsername', currentUsername);

            // Restore saved locations from localStorage with delay
            setTimeout(function () {
                var savedPickup = localStorage.getItem('saved_pickup_location');
                var savedDropoff = localStorage.getItem('saved_dropoff_location');
                var savedOrigin = localStorage.getItem('saved_origin');
                var savedDestination = localStorage.getItem('saved_destination');

                if (savedPickup) {
                    $('#from_places').val(savedPickup);
                }
                if (savedOrigin) {
                    $('#origin').val(savedOrigin);
                }
                if (savedDropoff) {
                    $('#to_places').val(savedDropoff);
                }
                if (savedDestination) {
                    $('#destination').val(savedDestination);
                }
            }, 100);

            // Save locations when user types
            $('#from_places').on('input', function () {
                localStorage.setItem('saved_pickup_location', $(this).val());
            });

            $('#to_places').on('input', function () {
                localStorage.setItem('saved_dropoff_location', $(this).val());
            });

            // Save hidden fields when they change
            $('#origin').on('change', function () {
                localStorage.setItem('saved_origin', $(this).val());
            });

            $('#destination').on('change', function () {
                localStorage.setItem('saved_destination', $(this).val());
            });
        });

        var isReverse = false;
        var map;

        // Super 3D car icons (local PNGs)
        var carImages = {
            'ViteGo': "{{ url_for('static', filename='images/uberx_3d.png') }}",
            'ViteGo XL': "{{ url_for('static', filename='images/vitego_xl_3d.png') }}",
        };

        function openTimePickerModal() {
            $('#timePickerModal').addClass('active');

            // Initialize inline calendar in the right panel
            var initialDate = moment().add(5, 'minutes');
            if (!$('#inline-calendar').data('DateTimePicker')) {
                $('#inline-calendar').datetimepicker({
                    format: 'YYYY-MM-DD HH:mm',
                    defaultDate: initialDate,
                    minDate: initialDate,
                    inline: true,
                    sideBySide: true,
                    icons: {
                        time: 'fa fa-clock-o',
                        date: 'fa fa-calendar',
                        up: 'fa fa-chevron-up',
                        down: 'fa fa-chevron-down',
                        previous: 'fa fa-chevron-left',
                        next: 'fa fa-chevron-right',
                        today: 'fa fa-crosshairs',
                        clear: 'fa fa-trash',
                        close: 'fa fa-times'
                    }
                });

                // Update custom_datetime when calendar changes
                $('#inline-calendar').on('dp.change', function (e) {
                    var selectedTime = e.date.format('YYYY-MM-DD HH:mm');
                    $('#custom_datetime').val(selectedTime);
                    $('#selected_datetime').val(selectedTime);

                    // Update display
                    var displayTime = e.date.format('MMM D, h:mm A');
                    $('#display_time').text(displayTime);

                    // Clear quick button selection
                    $('.quick-time-btn').removeClass('active');
                });
            }

            // Set default if no time selected - default to "Now" (5 min)
            if (!$('#selected_datetime').val()) {
                setQuickTime(5);
            }
        }

        function closeTimePickerModal() {
            $('#timePickerModal').removeClass('active');
            $('.quick-time-btn').removeClass('active');
        }

        function setQuickTime(minutes) {
            var selectedTime = moment().add(minutes, 'minutes').format('YYYY-MM-DD HH:mm');
            $('#custom_datetime').val(selectedTime);
            $('#selected_datetime').val(selectedTime);

            // Update display text
            var displayText = moment().add(minutes, 'minutes').format('MMM D, h:mm A');
            $('#display_time').text(displayText);

            // Visual feedback on buttons
            $('.quick-time-btn').removeClass('active');
            if (minutes === 5) {
                $('.quick-time-btn').eq(0).addClass('active');
            } else if (minutes === 15) {
                $('.quick-time-btn').eq(1).addClass('active');
            } else if (minutes === 30) {
                $('.quick-time-btn').eq(2).addClass('active');
            }
        }

        function confirmTimeSelection() {
            var selectedTime = $('#custom_datetime').val();
            if (selectedTime) {
                $('#selected_datetime').val(selectedTime);
                // Update button text to show selected time
                var displayTime = moment(selectedTime, 'YYYY-MM-DD HH:mm').format('MMM D, h:mm A');
                $('.datetime-toggle').html('🕐 ' + displayTime).addClass('active');
            }
            closeTimePickerModal();
        }

        function toggleCustomTimePopup() {
            var popup = $('#customTimePopup');
            var btn = $('.custom-time-btn');

            if (popup.hasClass('active')) {
                closeCustomTimePopup();
            } else {
                // Move popup to body to ensure it's above everything including map
                if (!popup.parent().is('body')) {
                    popup.appendTo('body');
                }

                // Clear any existing calendar HTML and destroy old instance
                $('#inline-calendar').empty();
                if ($('#inline-calendar').data('DateTimePicker')) {
                    $('#inline-calendar').data('DateTimePicker').destroy();
                }
                $('#inline-calendar').removeData('DateTimePicker');

                // Show popup first
                popup.addClass('active');
                btn.addClass('active');

                // Update display text to current time immediately
                var currentMinDate = moment().add(5, 'minutes');
                var displayTime = currentMinDate.format('MMM D, h:mm A');
                $('#display_time').text(displayTime);
                $('#custom_datetime').val(currentMinDate.format('YYYY-MM-DD HH:mm'));
                $('#selected_datetime').val(currentMinDate.format('YYYY-MM-DD HH:mm'));

                // Initialize calendar AFTER popup is visible
                setTimeout(function () {
                    var nowDate = moment().add(5, 'minutes');
                    $('#inline-calendar').datetimepicker({
                        format: 'YYYY-MM-DD HH:mm',
                        defaultDate: nowDate,
                        minDate: nowDate,
                        inline: true,
                        sideBySide: true
                    });

                    // Force the date immediately after creation
                    var picker = $('#inline-calendar').data('DateTimePicker');
                    if (picker) {
                        picker.date(nowDate);
                        picker.viewDate(nowDate);
                    }

                    // Remove button styles
                    $('#inline-calendar .timepicker .btn').each(function () {
                        this.style.cssText = '';
                    });
                }, 50);
            }
        }

        function closeCustomTimePopup() {
            $('#customTimePopup').removeClass('active');
            $('.custom-time-btn').removeClass('active');
        }

        // Close popup when clicking outside
        $(document).on('click', function (e) {
            if (!$(e.target).closest('.custom-time-popup, .custom-time-btn').length) {
                if ($('#customTimePopup').hasClass('active')) {
                    closeCustomTimePopup();
                }
            }
        });

        // Close modal on ESC key
        $(document).on('keydown', function (e) {
            if (e.key === 'Escape' && $('#timePickerModal').hasClass('active')) {
                closeTimePickerModal();
            }
        });

        function generateRandomPickupTime() {
            return moment().add(Math.floor(Math.random() * (5 - 2 + 1)) + 2, 'minutes').format('YYYY-MM-DD HH:mm');
        }

        function calculateTripCost(estimatedDistance) {
            estimatedDistance = parseFloat(estimatedDistance);
            if (isNaN(estimatedDistance) || estimatedDistance === null) {
                console.error("Invalid input for calculateTripCost:", estimatedDistance);
                return 'N/A';
            }
            var costPerKilometer = 1.5;
            var totalCost = estimatedDistance * costPerKilometer;
            return totalCost.toFixed(2);
        }

        function displayCarList(carsList, estimatedDuration, estimatedDistance) {
            var cars = '';
            carsList.forEach(function (car, index) {
                var carImage = carImages[car.name] || 'path/to/default_image.jpg';
                var arrivalTime = moment(car.pickupTime, 'YYYY-MM-DD HH:mm').add(estimatedDuration, 'minutes').format('YYYY-MM-DD HH:mm');
                var tripCost = calculateTripCost(parseFloat(estimatedDistance));
                var badge = index === 0 ? '<span class="car-badge">Popular</span>' : '';

                cars += '<div class="car-item" onclick="selectCar(\'' + car.name + '\', \'' + car.pickupTime + '\', \'' + arrivalTime + '\', ' + tripCost + ')">' +
                    '<div class="car-image-container">' +
                    '<img src="' + carImage + '" alt="' + car.name + '" class="car-image">' +
                    '</div>' +
                    '<div class="car-details">' +
                    '<h4>' + car.name + ' ' + badge + '</h4>' +
                    '<div class="car-info-row"><span class="car-info-icon">🕐</span><span>Pickup at ' + moment(car.pickupTime, 'YYYY-MM-DD HH:mm').format('h:mm A') + '</span></div>' +
                    '<div class="car-info-row"><span class="car-info-icon">📍</span><span>Arrive by ' + moment(arrivalTime, 'YYYY-MM-DD HH:mm').format('h:mm A') + '</span></div>' +
                    '<div class="car-info-row"><span class="car-info-icon">⏱️</span><span>Estimated ' + estimatedDuration + ' min</span></div>' +
                    '<p class="cost-info">$' + tripCost + '<span style="font-size: 0.95rem; font-weight: 650; color: rgba(28,25,23,0.7); margin-left: 0.35rem;">est.</span></p>' +
                    '</div></div>';

                sessionStorage.setItem('trip_cost', tripCost);
            });

            $('#car_list').html(cars);
            // schedule toggle hides #car_list; ensure it's visible again
            $('#car_list').removeClass('hide').show();
            openCarModal();
        }

        function showNonDrivingSummary(distanceText, durationMinutes) {
            // Hide any ride-selection UI for non-driving modes
            $('#ride_request').hide();
            $('#selected_car').empty();
            sessionStorage.removeItem('trip_cost');
            closeCarModal();
            $('#car_list').hide().empty();

            $('#route-summary-text').text('Distance: ' + distanceText + ' • Time: ~' + durationMinutes + ' min');
            $('#route-summary').addClass('show');
        }

        function openCarModal() {
            $('#carModal').addClass('active');
            document.body.style.overflow = 'hidden';
        }

        function closeCarModal() {
            $('#carModal').removeClass('active');
            document.body.style.overflow = '';
        }

        // Close modal when clicking outside
        $('#carModal').on('click', function (e) {
            if (e.target.id === 'carModal') {
                closeCarModal();
            }
        });

        // Close modal on ESC key
        $(document).on('keydown', function (e) {
            if (e.key === 'Escape' && $('#carModal').hasClass('active')) {
                closeCarModal();
            }
        });

        function selectCar(carName, pickupTime, arrivalTime, tripCost) {
            var carImage = carImages[carName] || 'path/to/default_image.jpg';

            var selectedCarHtml = '<div class="car-item selected" style="background: linear-gradient(135deg, rgba(255,255,255,0.95), rgba(248,250,252,0.9)); border: 1px solid rgba(249,115,22,0.2); box-shadow: 0 4px 20px rgba(249,115,22,0.1);">' +
                '<div class="car-image-container">' +
                '<img src="' + carImage + '" alt="' + carName + '" class="car-image">' +
                '</div>' +
                '<div class="car-details">' +
                '<h4>' + carName + '</h4>' +
                '<div class="car-info-row"><span class="car-info-icon">🕐</span><span>Pickup at ' + moment(pickupTime, 'YYYY-MM-DD HH:mm').format('h:mm A') + '</span></div>' +
                '<div class="car-info-row"><span class="car-info-icon">📍</span><span>Arrive by ' + moment(arrivalTime, 'YYYY-MM-DD HH:mm').format('h:mm A') + '</span></div>' +
                '<p class="cost-info">$' + tripCost + '</p>' +
                '</div>' +
                '</div>';

            $('#selected_car').html(selectedCarHtml);
            $('#ride_request').show();
            sessionStorage.setItem('trip_cost', tripCost);

            // Close modal and scroll to selected car
            closeCarModal();
            setTimeout(() => {
                $('#ride_request')[0].scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            }, 300);
        }

        function deselectRide() {
            $('#selected_car').empty();
            $('#ride_request').hide();
            sessionStorage.removeItem('trip_cost');
            // Let the user pick again immediately
            openCarModal();
        }

        function requestRide() {
            var originAddress = $('#from_places').val();
            var destinationAddress = $('#to_places').val();

            getCoordinatesFromAddress(originAddress, function (originCoordinates) {
                if (!originCoordinates) {
                    alert('Error getting coordinates for the origin address. Please try again.');
                    return;
                }

                var currentUsername = '{{ current_user.username }}';
                var selectedCarHtml = $('#selected_car').html();
                var tripCost = parseFloat(sessionStorage.getItem('trip_cost'));

                var rideData = {
                    username: currentUsername,
                    selectedCarHtml: selectedCarHtml,
                    status: 'requested',
                    origin: originAddress,
                    destination: destinationAddress,
                    origin_lat: originCoordinates.latitude,
                    origin_lng: originCoordinates.longitude,
                    tripCost: tripCost,
                    pickup_time: $('#selected_datetime').val() || null
                };

                $.ajax({
                    type: 'POST',
                    url: '/save_ride',
                    contentType: 'application/json;charset=UTF-8',
                    data: JSON.stringify(rideData),
                    success: function (response) {
                        if (response.status === 'success') {
                            window.location.href = '/chat?trip_cost=' + tripCost;
                        } else {
                            alert('Failed to request ride. Please try again.');
                        }
                    },
                    error: function (error) {
                        alert('Error requesting ride. Please try again.');
                        console.error('Error:', error);
                    }
                });
            });
        }

        function getCoordinatesFromAddress(address, callback) {
            var geocoder = new google.maps.Geocoder();
            geocoder.geocode({ 'address': address }, function (results, status) {
                if (status === google.maps.GeocoderStatus.OK) {
                    if (results[0]) {
                        var location = results[0].geometry.location;
                        callback({
                            latitude: location.lat(),
                            longitude: location.lng()
                        });
                    } else {
                        console.error('No results found for the given address');
                        callback(null);
                    }
                } else {
                    console.error('Geocoding failed due to: ' + status);
                    callback(null);
                }
            });
        }

        function setPickupNow() {
            isReverse = false;
            var pickupTime = moment().add(Math.floor(Math.random() * (5 - 2 + 1)) + 2, 'minutes');
            $('#selected_datetime').val(pickupTime.format('YYYY-MM-DD HH:mm'));
            $('#car_list').hide();
        }

        function getCurrentPosition() {
            if (!navigator.geolocation) {
                alert('Geolocation is not supported by this browser.');
                return;
            }

            // Add loading state
            const locationBtn = $('.location-btn');
            const originalText = locationBtn.html();
            locationBtn.addClass('loading');
            locationBtn.html('Getting your location...');

            navigator.geolocation.getCurrentPosition(
                function (pos) {
                    setCurrentPosition(pos);
                    // Remove loading state on success
                    setTimeout(() => {
                        locationBtn.removeClass('loading');
                        locationBtn.html('✓ Location Set!');
                        setTimeout(() => {
                            locationBtn.html(originalText);
                        }, 1000);
                    }, 200);
                },
                function (error) {
                    // Remove loading state on error
                    locationBtn.removeClass('loading');
                    locationBtn.html(originalText);

                    let msg = "Unable to get your current location.";
                    switch (error.code) {
                        case error.PERMISSION_DENIED:
                            msg = "Location access was denied. Please click the Lock icon 🔒 in your address bar and set 'Location' to 'Allow'.";
                            break;
                        case error.POSITION_UNAVAILABLE:
                            msg = "Location information is unavailable on this device.";
                            break;
                        case error.TIMEOUT:
                            msg = "The request to get your location timed out.";
                            break;
                        default:
                            if (window.location.protocol !== 'https:' && window.location.hostname !== 'localhost') {
                                msg = "Geolocation requires HTTPS. Please access via 'localhost' or an HTTPS connection.";
                            }
                    }

                    showToast("Location Error", msg, "error", 10000);
                    console.error('Geolocation error:', error);
                }, {
                enableHighAccuracy: true,
                timeout: 8000,
                maximumAge: 0
            }
            );
        }

        function setCurrentPosition(pos) {
            var geocoder = new google.maps.Geocoder();
            var latlng = new google.maps.LatLng(pos.coords.latitude, pos.coords.longitude);

            geocoder.geocode({ 'latLng': latlng }, function (results, status) {
                if (status === google.maps.GeocoderStatus.OK) {
                    if (results[0]) {
                        var formattedAddress = results[0].formatted_address;
                        var originLat = results[0].geometry.location.lat();
                        var originLng = results[0].geometry.location.lng();

                        // Smooth input update with animation
                        $('#from_places').val(formattedAddress).focus();
                        $('#origin').val(formattedAddress);

                        if (map) {
                            map.panTo({ lat: originLat, lng: originLng });
                            map.setZoom(16);
                        }
                    }
                } else {
                    showToast("Geocoder Failed", "Geocoder failed due to: " + status, "error");
                }
            });
        }

        function initUberMap() {
            var myLatLng = { lat: 52.520008, lng: 13.404954 };
            // Map initialized directly for speed
            map = new google.maps.Map(document.getElementById('map'), {
                zoom: 16,
                center: myLatLng,
                disableDefaultUI: false,
                mapTypeControl: false,
                streetViewControl: false
            });

            var from_places = new google.maps.places.Autocomplete(document.getElementById('from_places'));
            var to_places = new google.maps.places.Autocomplete(document.getElementById('to_places'));

            function setAddress(input, output) {
                google.maps.event.addListener(input, 'place_changed', function () {
                    var place = input.getPlace();
                    var address = place.formatted_address;
                    $(output).val(address);

                    // Save to localStorage when autocomplete selects a place
                    if (output === '#origin') {
                        localStorage.setItem('saved_origin', address);
                        localStorage.setItem('saved_pickup_location', address);
                    } else if (output === '#destination') {
                        localStorage.setItem('saved_destination', address);
                        localStorage.setItem('saved_dropoff_location', address);
                    }
                });
            }

            setAddress(from_places, '#origin');
            setAddress(to_places, '#destination');
        }

        $(function () {
            var activeDirectionsDisplay = null;
            var activeDirectionsDisplayOutline = null;
            var activeTransitStopMarkers = [];
            var activeTransitPolylines = [];

            function clearActiveRoute() {
                // Clear any transit stop markers
                if (activeTransitStopMarkers && activeTransitStopMarkers.length) {
                    activeTransitStopMarkers.forEach(function (m) { m.setMap(null); });
                    activeTransitStopMarkers = [];
                }
                if (activeTransitPolylines && activeTransitPolylines.length) {
                    activeTransitPolylines.forEach(function (p) { p.setMap(null); });
                    activeTransitPolylines = [];
                }
                if (activeDirectionsDisplayOutline) {
                    activeDirectionsDisplayOutline.setMap(null);
                    activeDirectionsDisplayOutline.setDirections({ routes: [] });
                }
                if (activeDirectionsDisplay) {
                    activeDirectionsDisplay.setMap(null);
                    activeDirectionsDisplay.setDirections({ routes: [] });
                }
            }

            function addTransitStopMarkers(directionsResult) {
                try {
                    var route = directionsResult.routes && directionsResult.routes[0];
                    var leg = route && route.legs && route.legs[0];
                    var steps = (leg && leg.steps) || [];

                    steps.forEach(function (step) {
                        if (!step || step.travel_mode !== 'TRANSIT' || !step.transit) return;

                        var dep = step.transit.departure_stop;
                        var arr = step.transit.arrival_stop;

                        [dep, arr].forEach(function (stop) {
                            if (!stop || !stop.location) return;
                            var marker = new google.maps.Marker({
                                map: map,
                                position: stop.location,
                                title: stop.name || 'Transit stop',
                                icon: {
                                    path: google.maps.SymbolPath.CIRCLE,
                                    scale: 7,
                                    fillColor: '#ea580c',
                                    fillOpacity: 1,
                                    strokeColor: '#ffffff',
                                    strokeWeight: 2
                                }
                            });
                            activeTransitStopMarkers.push(marker);
                        });
                    });
                } catch (e) {
                    // fail silently; route still shows
                }
            }

            function drawTransitFullPath(directionsResult) {
                // Draw WALKING legs (dashed) + TRANSIT legs (solid) so the full journey is visible.
                try {
                    if (activeTransitPolylines && activeTransitPolylines.length) {
                        activeTransitPolylines.forEach(function (p) { p.setMap(null); });
                        activeTransitPolylines = [];
                    }

                    var route = directionsResult.routes && directionsResult.routes[0];
                    var leg = route && route.legs && route.legs[0];
                    var steps = (leg && leg.steps) || [];

                    // Fallback: if steps don't have paths, draw overview.
                    if (!steps.length || !steps.some(function (s) { return s && s.path && s.path.length; })) {
                        if (route && route.overview_path && route.overview_path.length) {
                            activeTransitPolylines.push(new google.maps.Polyline({
                                map: map,
                                path: route.overview_path,
                                strokeColor: '#ea580c',
                                strokeOpacity: 0.95,
                                strokeWeight: 7
                            }));
                        }
                        return;
                    }

                    steps.forEach(function (step) {
                        if (!step || !step.path || !step.path.length) return;
                        var mode = (step.travel_mode || '').toUpperCase();

                        if (mode === 'WALKING') {
                            // dashed walking line
                            activeTransitPolylines.push(new google.maps.Polyline({
                                map: map,
                                path: step.path,
                                strokeOpacity: 0,
                                icons: [{
                                    icon: {
                                        path: 'M 0,-1 0,1',
                                        strokeOpacity: 1,
                                        strokeColor: '#2563eb',
                                        strokeWeight: 4
                                    },
                                    offset: '0',
                                    repeat: '14px'
                                }]
                            }));
                        } else if (mode === 'TRANSIT') {
                            activeTransitPolylines.push(new google.maps.Polyline({
                                map: map,
                                path: step.path,
                                strokeColor: '#7c3aed',
                                strokeOpacity: 0.95,
                                strokeWeight: 7
                            }));
                        } else {
                            // other (rare) segments
                            activeTransitPolylines.push(new google.maps.Polyline({
                                map: map,
                                path: step.path,
                                strokeColor: '#ea580c',
                                strokeOpacity: 0.75,
                                strokeWeight: 6
                            }));
                        }
                    });
                } catch (e) {
                    // ignore; renderer will still show something
                }
            }

            function getRouteStyle(travel_mode) {
                var mode = (travel_mode || '').toUpperCase();
                var color = '#de2e03'; // DRIVING default
                if (mode === 'WALKING') color = '#2563eb';
                if (mode === 'BICYCLING') color = '#10b981';
                if (mode === 'TRANSIT') color = '#ea580c';

                return {
                    strokeColor: color,
                    strokeOpacity: 0.95,
                    strokeWeight: 8,
                    zIndex: 10
                };
            }

            function getRouteOutlineStyle() {
                return {
                    strokeColor: '#0b0b0c',
                    strokeOpacity: 0.35,
                    strokeWeight: 12,
                    zIndex: 9
                };
            }

            function displayRoute(travel_mode, origin, destination, directionsService, directionsDisplay, directionsDisplayOutline) {
                directionsService.route({
                    origin: origin,
                    destination: destination,
                    travelMode: travel_mode,
                    avoidTolls: true
                }, function (response, status) {
                    if (status === 'OK') {
                        if (directionsDisplayOutline) {
                            directionsDisplayOutline.setMap(map);
                            directionsDisplayOutline.setDirections(response);
                        }
                        directionsDisplay.setMap(map);
                        directionsDisplay.setDirections(response);

                        if ((travel_mode || '').toUpperCase() === 'TRANSIT') {
                            addTransitStopMarkers(response);
                            drawTransitFullPath(response);
                        }
                    } else {
                        if (directionsDisplayOutline) {
                            directionsDisplayOutline.setMap(null);
                            directionsDisplayOutline.setDirections(null);
                        }
                        directionsDisplay.setMap(null);
                        directionsDisplay.setDirections(null);

                        // Show user-friendly error message
                        var errorMessage = '';
                        if (status === 'ZERO_RESULTS') {
                            errorMessage = '🗺️ No route found between these locations. Please check the addresses and try different locations.';
                        } else if (status === 'NOT_FOUND') {
                            errorMessage = '📍 One or both locations could not be found. Please verify the addresses.';
                        } else if (status === 'OVER_QUERY_LIMIT') {
                            errorMessage = '⏱️ Service temporarily unavailable. Please try again in a moment.';
                        } else {
                            errorMessage = '❌ Unable to calculate route. Please check your locations and try again.';
                        }

                        // Use the existing error display system
                        $('#error-text').text(errorMessage);
                        $('#validation-error').addClass('show');

                        // Auto-hide after 5 seconds
                        setTimeout(() => {
                            $('#validation-error').removeClass('show');
                        }, 5000);
                    }
                });
            }

            function calculateDistance(travel_mode, origin, destination) {
                var service = new google.maps.DistanceMatrixService();
                service.getDistanceMatrix({
                    origins: [origin],
                    destinations: [destination],
                    travelMode: travel_mode,
                    unitSystem: google.maps.UnitSystem.METRIC,
                    avoidHighways: false,
                    avoidTolls: false
                }, function (response, status) {
                    save_results(response, status);
                });
            }

            function save_results(response, status) {
                if (status !== google.maps.DistanceMatrixStatus.OK) {
                    // Show user-friendly error message for distance matrix errors
                    var errorMessage = '';
                    if (status === 'ZERO_RESULTS') {
                        errorMessage = '🗺️ No route found between these locations. Please check the addresses and try different locations.';
                    } else if (status === 'NOT_FOUND') {
                        errorMessage = '📍 One or both locations could not be found. Please verify the addresses.';
                    } else if (status === 'OVER_QUERY_LIMIT') {
                        errorMessage = '⏱️ Service temporarily unavailable. Please try again in a moment.';
                    } else {
                        errorMessage = '❌ Unable to calculate route. Please check your locations and try again.';
                    }

                    // Use the existing error display system
                    $('#error-text').text(errorMessage);
                    $('#validation-error').addClass('show');

                    // Auto-hide after 5 seconds
                    setTimeout(() => {
                        $('#validation-error').removeClass('show');
                    }, 5000);
                } else {
                    try {
                        var pickupTimeInput = $('#selected_datetime');
                        var pickupTime;

                        if (pickupTimeInput.val()) {
                            // datetimepicker sometimes returns values with slightly different formats.
                            // Try strict first; if it fails, fall back to a more lenient parse.
                            pickupTime = moment(pickupTimeInput.val(), 'YYYY-MM-DD HH:mm', true);
                            // If datetimepicker returns a value in an unexpected format, fall back.
                            if (!pickupTime.isValid()) {
                                setPickupNow();
                                pickupTime = moment($('#selected_datetime').val());
                            }
                            if (isReverse && pickupTime.isBefore(moment().add(30, 'minutes'))) {
                                showToast("Invalid Time", "Please choose a pickup time at least 30 minutes from the current time.", "info");
                                return;
                            }
                        } else {
                            setPickupNow();
                            // setPickupNow() sets #selected_datetime; re-parse it so cars are shown
                            pickupTime = moment($('#selected_datetime').val());
                        }

                        var carsList = [
                            { name: 'ViteGo', pickupTime: pickupTime.format('YYYY-MM-DD HH:mm') },
                            { name: 'ViteGo XL', pickupTime: pickupTime.format('YYYY-MM-DD HH:mm') },
                        ];

                        var distanceText = response.rows[0].elements[0].distance.text;
                        var distanceInKm = response.rows[0].elements[0].distance.value / 1000;
                        var durationInSeconds = response.rows[0].elements[0].duration.value;
                        var durationInMinutes = Math.ceil(durationInSeconds / 60);

                        var travel_mode = $('#travel_mode').val();
                        if (travel_mode && travel_mode.toUpperCase() !== 'DRIVING') {
                            showNonDrivingSummary(distanceText, durationInMinutes);
                            return;
                        }

                        displayCarList(carsList, durationInMinutes, distanceInKm);
                    } catch (error) {
                        console.error("Error processing API response:", error);
                        // Use user-friendly error message instead of technical details
                        $('#error-text').text('❌ Unable to process route information. Please try again.');
                        $('#validation-error').addClass('show');

                        // Auto-hide after 5 seconds
                        setTimeout(() => {
                            $('#validation-error').removeClass('show');
                        }, 5000);
                    }
                }
            }

            // Validation function
            function showError(message, fieldId) {
                const errorDiv = $('#validation-error');
                const errorText = $('#error-text');
                const field = $('#' + fieldId);

                errorText.text(message);
                errorDiv.addClass('show');
                field.addClass('error');

                // Auto-hide after 4 seconds
                setTimeout(() => {
                    errorDiv.removeClass('show');
                }, 4000);

                // Remove error styling when user starts typing
                field.one('input', function () {
                    $(this).removeClass('error');
                });
            }

            $('#distance_form').submit(function (e) {
                e.preventDefault();

                // Clear previous errors
                $('#validation-error').removeClass('show');
                $('#route-summary').removeClass('show');
                $('#from_places, #to_places').removeClass('error');

                var origin = $('#origin').val();
                var destination = $('#destination').val();
                var fromPlaces = $('#from_places').val();
                var toPlaces = $('#to_places').val();

                // Validate pickup location
                if (!fromPlaces || !fromPlaces.trim()) {
                    showError('Please enter a pickup location', 'from_places');
                    $('#from_places').focus();
                    return;
                }

                if (!origin || !origin.trim()) {
                    showError('Please select a valid pickup location from the dropdown', 'from_places');
                    $('#from_places').focus();
                    return;
                }

                // Validate dropoff location
                if (!toPlaces || !toPlaces.trim()) {
                    showError('Please enter a dropoff location', 'to_places');
                    $('#to_places').focus();
                    return;
                }

                if (!destination || !destination.trim()) {
                    showError('Please select a valid dropoff location from the dropdown', 'to_places');
                    $('#to_places').focus();
                    return;
                }

                var travel_mode = $('#travel_mode').val();
                var pickupTimeInput = $('#selected_datetime');
                var pickupTime;

                if (pickupTimeInput.val()) {
                    pickupTime = moment(pickupTimeInput.val(), 'YYYY-MM-DD HH:mm', true);
                    if (!pickupTime.isValid()) {
                        setPickupNow();
                        pickupTime = moment($('#selected_datetime').val());
                    }
                    if (isReverse && pickupTime.isBefore(moment().add(30, 'minutes'))) {
                        showError('Please choose a pickup time at least 30 minutes from the current time', 'selected_datetime');
                        return;
                    }
                } else {
                    setPickupNow();
                    // setPickupNow() sets #selected_datetime; continue so the trip can be calculated
                    pickupTime = moment($('#selected_datetime').val());
                }

                clearActiveRoute();

                var mode = (travel_mode || '').toUpperCase();
                if (mode === 'TRANSIT') {
                    // Use Google's default transit rendering (keeps full multi-segment transit path details).
                    activeDirectionsDisplayOutline = null;
                    activeDirectionsDisplay = new google.maps.DirectionsRenderer({
                        draggable: false,
                        suppressMarkers: false,
                        preserveViewport: false
                    });
                } else {
                    activeDirectionsDisplayOutline = new google.maps.DirectionsRenderer({
                        draggable: false,
                        suppressMarkers: true,
                        preserveViewport: false,
                        polylineOptions: getRouteOutlineStyle()
                    });

                    activeDirectionsDisplay = new google.maps.DirectionsRenderer({
                        draggable: false,
                        suppressMarkers: false,
                        preserveViewport: false,
                        polylineOptions: getRouteStyle(travel_mode)
                    });
                }
                var directionsService = new google.maps.DirectionsService();
                displayRoute(travel_mode, origin, destination, directionsService, activeDirectionsDisplay, activeDirectionsDisplayOutline);
                calculateDistance(travel_mode, origin, destination);
            });

        });
    </script>
    <!-- Google Maps Script (at the end to ensure callback exists) -->
    <script async defer src="https://maps.googleapis.com/maps/api/js?key={{ google_maps_api_key }}&libraries=places&language=en&callback=initUberMap"></script>
</body>
