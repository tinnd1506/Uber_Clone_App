<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book a Ride | ViteGo</title>
    
    <!-- Modern Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Styles -->
    <link rel="stylesheet" href="{{ url_for('static', filename='styles/modern_shared.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-datetimepicker/4.17.47/css/bootstrap-datetimepicker.min.css">
    
    <!-- Scripts -->
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.3.1/jquery.min.js"></script>
    <script async defer src="https://maps.googleapis.com/maps/api/js?key=AIzaSyABdGoPrYmiq5r3fur6Q3kVFGUXrKTNg3s&libraries=places&language=en&callback=initUberMap"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/moment.js/2.29.1/moment.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-datetimepicker/4.17.47/js/bootstrap-datetimepicker.min.js"></script>
    
    <style>
        .page-grid {
            display: grid;
            grid-template-columns: 450px 1fr;
            gap: 2rem;
            align-items: start;
        }
        
        .booking-panel {
            position: sticky;
            top: 120px;
        }
        
        .map-container {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(30px);
            border: 1px solid rgba(0, 0, 0, 0.05);
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.08);
        }
        
        #map {
            width: 100%;
            height: 600px;
        }
        
        .location-btn {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.75rem 1.25rem;
            background: rgba(222, 46, 3, 0.1);
            color: #de2e03;
            border: 2px solid rgba(222, 46, 3, 0.2);
            border-radius: 12px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 0.5rem;
        }
        
        .location-btn:hover {
            background: rgba(222, 46, 3, 0.15);
            border-color: rgba(222, 46, 3, 0.4);
            transform: translateY(-2px);
        }
        
        .datetime-toggle {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.75rem 1.25rem;
            background: rgba(255, 255, 255, 0.8);
            border: 2px solid rgba(0, 0, 0, 0.1);
            border-radius: 12px;
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .datetime-toggle:hover {
            border-color: #de2e03;
            background: rgba(255, 255, 255, 1);
        }
        
        #datetimepicker {
            margin-top: 1rem;
            padding: 1rem;
            background: rgba(255, 255, 255, 0.5);
            border-radius: 12px;
        }
        
        .car-list {
            margin-top: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        
        .car-item {
            display: flex;
            gap: 1.5rem;
            padding: 1.5rem;
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(0, 0, 0, 0.06);
            border-radius: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 14px 45px rgba(0, 0, 0, 0.08);
            position: relative;
            overflow: hidden;
        }

        .car-item::before {
            content: "";
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(222, 46, 3, 0.12), rgba(255, 255, 255, 0));
            opacity: 0;
            transition: opacity 0.2s ease;
            pointer-events: none;
        }
        
        .car-item:hover {
            background: rgba(255, 255, 255, 0.9);
            border-color: #de2e03;
            transform: translateY(-2px);
            box-shadow: 0 18px 60px rgba(222, 46, 3, 0.14);
        }

        .car-item:hover::before {
            opacity: 1;
        }
        
        .car-image-container {
            width: 112px;
            height: 112px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, rgba(222, 46, 3, 0.06), rgba(255, 255, 255, 0));
            border-radius: 14px;
            border: 1px solid rgba(0, 0, 0, 0.06);
        }
        
        .car-image {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }
        
        .car-details h4 {
            font-family: 'Poppins', sans-serif;
            font-size: 1.35rem;
            font-weight: 800;
            margin: 0 0 0.5rem 0;
            color: #1c1917;
            letter-spacing: -0.3px;
        }
        
        .car-details p {
            margin: 0.25rem 0;
            font-size: 0.9rem;
            color: #57534e;
        }
        
        .cost-info {
            font-size: 1.2rem !important;
            font-weight: 800 !important;
            color: #de2e03 !important;
        }

        @media (max-width: 520px) {
            .car-item {
                padding: 1.15rem;
                gap: 1rem;
            }
            .car-image-container {
                width: 72px;
                height: 72px;
            }
            .car-details h4 {
                font-size: 1.2rem;
            }
        }
        
        .selected-car-section {
            margin-top: 2rem;
            padding: 1.5rem;
            background: linear-gradient(135deg, rgba(222, 46, 3, 0.05), rgba(255, 87, 34, 0.05));
            border-radius: 16px;
            border: 2px solid rgba(222, 46, 3, 0.2);
        }
        
        .selected-car-section h3 {
            font-family: 'Poppins', sans-serif;
            font-size: 1.25rem;
            font-weight: 700;
            margin-bottom: 1rem;
            color: #1c1917;
        }
        
        @media (max-width: 1024px) {
            .page-grid {
                grid-template-columns: 1fr;
            }
            
            .booking-panel {
                position: static;
            }
        }
    </style>
</head>
<body>
    <!-- Modern Navigation -->
    <nav class="modern-nav">
        <div class="nav-container">
            <a href="{{ url_for('welcome') }}" class="nav-logo" onclick="localStorage.clear(); sessionStorage.clear();">Vite<span>Go</span></a>
            <div class="nav-actions">
                <span class="nav-user">👋 {{ current_user.username }}</span>
                <a href="{{ url_for('payment') }}" class="nav-btn nav-btn-secondary">Ride History</a>
                <a href="{{ url_for('chat') }}" class="nav-btn nav-btn-secondary">My Rides</a>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="modern-container">
        <div class="page-grid">
            <!-- Left Panel - Booking Form -->
            <div class="booking-panel">
                <div class="modern-card fade-in">
                    <div class="card-header">
                        <h1 class="card-title">Book Your Ride</h1>
                        <p class="card-subtitle">Fast, reliable rides at your fingertips</p>
                    </div>

                    <form id="distance_form" class="booking-form">
                        <div class="form-group">
                            <label class="form-label">📍 Pickup Location</label>
                            <input class="form-input" id="from_places" placeholder="Enter pickup address" />
                            <input id="origin" name="origin" required type="hidden" />
                            <button type="button" class="location-btn" onclick="getCurrentPosition()">
                                📌 Use Current Location
                            </button>
                        </div>

                        <div class="form-group">
                            <label class="form-label">🎯 Dropoff Location</label>
                            <input class="form-input" id="to_places" placeholder="Enter destination" />
                            <input id="destination" name="destination" required type="hidden" />
                        </div>

                        <div class="form-group">
                            <label class="form-label">🕐 Pickup Time</label>
                            <button type="button" class="datetime-toggle" onclick="toggleDateTimePicker()">
                                ⏰ Schedule Pickup
                            </button>
                            
                            <div id="datetimepicker" style="display: none;">
                                <label class="form-label">Select Date and Time:</label>
                                <input type='text' class="form-input" id="selected_datetime" value="" />
                            </div>
                        </div>

                        <div class="form-group">
                            <label class="form-label">🚗 Travel Mode</label>
                            <select class="form-input" id="travel_mode" name="travel_mode">
                                <option value="DRIVING">🚗 Driving</option>
                                <option value="WALKING">🚶 Walking</option>
                                <option value="BICYCLING">🚴 Bicycle</option>
                                <option value="TRANSIT">🚌 Transit</option>
                            </select>
                        </div>

                        <button class="btn-modern btn-modern-primary" type="submit" style="width: 100%;">
                            Search Available Rides
                            <span>→</span>
                        </button>
                    </form>

                    <!-- Route summary (used for non-driving modes) -->
                    <div id="route-summary" style="display:none; margin-top: 1rem; padding: 1rem 1.25rem; background: rgba(255,255,255,0.75); border: 1px solid rgba(0,0,0,0.08); border-radius: 16px; color: #1c1917; font-weight: 600;">
                        🗺️ <span id="route-summary-text"></span>
                    </div>

                    <!-- Car List -->
                    <div id="car_list" class="car-list" style="display: none;"></div>

                    <!-- Selected Car -->
                    <div id="ride_request" class="selected-car-section" style="display: none;">
                        <h3>✅ Selected Ride:</h3>
                        <div id="selected_car"></div>
                        <div style="display: flex; gap: 0.75rem; margin-top: 1rem;">
                            <button class="btn-modern btn-modern-secondary" onclick="deselectRide()" style="flex: 1;">
                                Deselect Ride
                                <span>↺</span>
                            </button>
                            <button class="btn-modern btn-modern-success" onclick="requestRide()" style="flex: 1;">
                                Confirm & Request Ride
                                <span>✓</span>
                            </button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Right Panel - Map -->
            <div class="map-panel fade-in">
                <div class="map-container">
                    <div id="map"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Modern Shared JS -->
    <script src="{{ url_for('static', filename='scripts/modern_shared.js') }}"></script>

    <!-- Page Scripts -->
    <script>
        $(document).ready(function() {
            var currentUsername = "{{ current_user.username }}";
            $('body').data('currentUsername', currentUsername);
        });

        var isReverse = false;
        var map;

        // Super 3D car icons (local PNGs)
        var carImages = {
            'ViteGo': "{{ url_for('static', filename='images/uberx_3d.png') }}",
            'ViteGo XL': "{{ url_for('static', filename='images/vitego_xl_3d.png') }}",
        };

        function toggleDateTimePicker() {
            $('#datetimepicker').toggle();
            setDefaultTime();
        }

        function setDefaultTime() {
            var defaultPickupTime;
            if (isReverse) {
                defaultPickupTime = moment().add(30, 'minutes');
            } else {
                defaultPickupTime = moment().add(Math.floor(Math.random() * (5 - 2 + 1)) + 2, 'minutes');
            }
            $('#selected_datetime').val(defaultPickupTime.format('YYYY-MM-DD HH:mm'));
            $('#car_list').hide();
        }

        function generateRandomPickupTime() {
            return moment().add(Math.floor(Math.random() * (5 - 2 + 1)) + 2, 'minutes').format('YYYY-MM-DD HH:mm');
        }

        function calculateTripCost(estimatedDistance) {
            estimatedDistance = parseFloat(estimatedDistance);
            if (isNaN(estimatedDistance) || estimatedDistance === null) {
                console.error("Invalid input for calculateTripCost:", estimatedDistance);
                return 'N/A';
            }
            var costPerKilometer = 1.5;
            var totalCost = estimatedDistance * costPerKilometer;
            return totalCost.toFixed(2);
        }

        function displayCarList(carsList, estimatedDuration, estimatedDistance) {
            var cars = '';
            carsList.forEach(function (car) {
                var carImage = carImages[car.name] || 'path/to/default_image.jpg';
                var arrivalTime = moment(car.pickupTime, 'YYYY-MM-DD HH:mm').add(estimatedDuration, 'minutes').format('YYYY-MM-DD HH:mm');
                var tripCost = calculateTripCost(parseFloat(estimatedDistance));

                cars += '<div class="car-item" onclick="selectCar(\'' + car.name + '\', \'' + car.pickupTime + '\', \'' + arrivalTime + '\', ' + tripCost + ')">' +
                    '<div class="car-image-container">' +
                    '<img src="' + carImage + '" alt="' + car.name + '" class="car-image">' +
                    '</div>' +
                    '<div class="car-details">' +
                    '<h4>' + car.name + '</h4>' +
                    '<p class="pickup-info">🕐 Pickup at ' + car.pickupTime + '</p>' +
                    '<p class="arrival-info">📍 Arrive by ' + arrivalTime + '</p>' +
                    '<p class="cost-info">$' + tripCost + '<span style="font-size: 0.9rem; font-weight: 650; color: rgba(87,83,78,0.9); margin-left: 0.35rem;">est.</span></p>' +
                    '</div></div>';

                sessionStorage.setItem('trip_cost', tripCost);
            });

            $('#car_list').html(cars);
            $('#car_list').show();
        }

        function showNonDrivingSummary(distanceText, durationMinutes) {
            // Hide any ride-selection UI for non-driving modes
            $('#ride_request').hide();
            $('#selected_car').empty();
            sessionStorage.removeItem('trip_cost');
            $('#car_list').hide().empty();
            
            $('#route-summary-text').text('Distance: ' + distanceText + ' • Time: ~' + durationMinutes + ' min');
            $('#route-summary').show();
        }

        function selectCar(carName, pickupTime, arrivalTime, tripCost) {
            var carImage = carImages[carName] || 'path/to/default_image.jpg';

            var selectedCarHtml = '<div class="car-item" style="border-color: #de2e03; background: rgba(255, 255, 255, 0.9);">' +
                '<div class="car-image-container">' +
                '<img src="' + carImage + '" alt="' + carName + '" class="car-image">' +
                '</div>' +
                '<div class="car-details">' +
                '<h4>' + carName + '</h4>' +
                '<p class="pickup-info">🕐 Pickup at ' + pickupTime + '</p>' +
                '<p class="arrival-info">📍 Arrive by ' + (arrivalTime || 'N/A') + '</p>' +
                '<p class="cost-info">$' + tripCost + '<span style="font-size: 0.9rem; font-weight: 650; color: rgba(87,83,78,0.9); margin-left: 0.35rem;">est.</span></p>' +
                '</div>' +
                '</div>';

            $('#selected_car').html(selectedCarHtml);
            $('#ride_request').show();
            sessionStorage.setItem('trip_cost', tripCost);
        }

        function deselectRide() {
            $('#selected_car').empty();
            $('#ride_request').hide();
            sessionStorage.removeItem('trip_cost');
            // Let the user pick again immediately
            $('#car_list').show();
        }

        function requestRide() {
            var originAddress = $('#from_places').val();
            var destinationAddress = $('#to_places').val();

            getCoordinatesFromAddress(originAddress, function (originCoordinates) {
                if (!originCoordinates) {
                    showToast("Location Error", "Error getting coordinates for the origin address. Please try again.", "error");
                    return;
                }

                var currentUsername = '{{ current_user.username }}';
                var selectedCarHtml = $('#selected_car').html();
                var tripCost = parseFloat(sessionStorage.getItem('trip_cost'));

                var rideData = {
                    username: currentUsername,
                    selectedCarHtml: selectedCarHtml,
                    status: 'requested',
                    origin: originAddress,
                    destination: destinationAddress,
                    origin_lat: originCoordinates.latitude,
                    origin_lng: originCoordinates.longitude,
                    tripCost: tripCost,
                    pickup_time: $('#selected_datetime').val() || null
                };

                $.ajax({
                    type: 'POST',
                    url: '/save_ride',
                    contentType: 'application/json;charset=UTF-8',
                    data: JSON.stringify(rideData),
                    success: function (response) {
                        if (response.status === 'success') {
                            showToast("Success", "Ride requested successfully!", "success");
                            window.location.href = '/chat?trip_cost=' + tripCost;
                        } else {
                            showToast("Request Failed", "Failed to request ride. Please try again.", "error");
                        }
                    },
                    error: function (error) {
                        showToast("Error", "Error requesting ride. Please try again.", "error");
                        console.error('Error:', error);
                    }
                });
            });
        }

        function getCoordinatesFromAddress(address, callback) {
            var geocoder = new google.maps.Geocoder();
            geocoder.geocode({ 'address': address }, function (results, status) {
                if (status === google.maps.GeocoderStatus.OK) {
                    if (results[0]) {
                        var location = results[0].geometry.location;
                        callback({
                            latitude: location.lat(),
                            longitude: location.lng()
                        });
                    } else {
                        console.error('No results found for the given address');
                        callback(null);
                    }
                } else {
                    console.error('Geocoding failed due to: ' + status);
                    callback(null);
                }
            });
        }

        function setPickupNow() {
            isReverse = false;
            var pickupTime = moment().add(Math.floor(Math.random() * (5 - 2 + 1)) + 2, 'minutes');
            $('#selected_datetime').val(pickupTime.format('YYYY-MM-DD HH:mm'));
            $('#car_list').hide();
        }

        function getCurrentPosition() {
            if (!navigator.geolocation) {
                showToast("Not Supported", "Geolocation is not supported by this browser.", "info");
                return;
            }
            navigator.geolocation.getCurrentPosition(setCurrentPosition, function (error) {
                let msg = "Unable to get your current location.";
                
                switch(error.code) {
                    case error.PERMISSION_DENIED:
                        msg = "Location access was denied. Please click the Lock icon 🔒 in your browser's address bar and set 'Location' to 'Allow'.";
                        break;
                    case error.POSITION_UNAVAILABLE:
                        msg = "Location information is unavailable on this device or network.";
                        break;
                    case error.TIMEOUT:
                        msg = "The request to get your location timed out. Please try again.";
                        break;
                    default:
                        if (window.location.protocol !== 'https:' && window.location.hostname !== 'localhost') {
                            msg = "Geolocation requires HTTPS. Use 'localhost' or an HTTPS connection.";
                        }
                }
                
                showToast("Location Error", msg, "error", 10000);
                console.error('Geolocation error:', error);
            }, {
                enableHighAccuracy: true,
                timeout: 8000,
                maximumAge: 0
            });
        }

        function setCurrentPosition(pos) {
            var geocoder = new google.maps.Geocoder();
            var latlng = new google.maps.LatLng(pos.coords.latitude, pos.coords.longitude);

            geocoder.geocode({ 'latLng': latlng }, function (results, status) {
                if (status === google.maps.GeocoderStatus.OK) {
                    if (results[0]) {
                        var formattedAddress = results[0].formatted_address;
                        var originLat = results[0].geometry.location.lat();
                        var originLng = results[0].geometry.location.lng();

                        $('#from_places').val(formattedAddress);
                        $('#origin').val(formattedAddress);

                        if (map) {
                            map.setCenter({ lat: originLat, lng: originLng });
                        }
                    }
                } else {
                    showToast("Geocoder Failed", "Geocoder failed due to: " + status, "error");
                }
            });
        }

        function initUberMap() {
            var myLatLng = { lat: 52.520008, lng: 13.404954 };
            map = new google.maps.Map(document.getElementById('map'), { 
                zoom: 16, 
                center: myLatLng,
                styles: [
                    {
                        "featureType": "all",
                        "elementType": "geometry",
                        "stylers": [{"color": "#fef7f3"}]
                    },
                    {
                        "featureType": "road",
                        "elementType": "geometry",
                        "stylers": [{"color": "#ffffff"}]
                    }
                ]
            });

            var from_places = new google.maps.places.Autocomplete(document.getElementById('from_places'));
            var to_places = new google.maps.places.Autocomplete(document.getElementById('to_places'));

            function setAddress(input, output) {
                google.maps.event.addListener(input, 'place_changed', function () {
                    var place = input.getPlace();
                    var address = place.formatted_address;
                    $(output).val(address);
                });
            }

            setAddress(from_places, '#origin');
            setAddress(to_places, '#destination');
        }

        $(function () {
            var activeDirectionsDisplay = null;
            var activeDirectionsDisplayOutline = null;
            var activeTransitStopMarkers = [];
            var activeTransitPolylines = [];

            function clearActiveRoute() {
                // Clear any transit stop markers
                if (activeTransitStopMarkers && activeTransitStopMarkers.length) {
                    activeTransitStopMarkers.forEach(function (m) { m.setMap(null); });
                    activeTransitStopMarkers = [];
                }
                if (activeTransitPolylines && activeTransitPolylines.length) {
                    activeTransitPolylines.forEach(function (p) { p.setMap(null); });
                    activeTransitPolylines = [];
                }
                if (activeDirectionsDisplayOutline) {
                    activeDirectionsDisplayOutline.setMap(null);
                    activeDirectionsDisplayOutline.setDirections({ routes: [] });
                }
                if (activeDirectionsDisplay) {
                    activeDirectionsDisplay.setMap(null);
                    activeDirectionsDisplay.setDirections({ routes: [] });
                }
            }

            function addTransitStopMarkers(directionsResult) {
                try {
                    var route = directionsResult.routes && directionsResult.routes[0];
                    var leg = route && route.legs && route.legs[0];
                    var steps = (leg && leg.steps) || [];

                    steps.forEach(function (step) {
                        if (!step || step.travel_mode !== 'TRANSIT' || !step.transit) return;

                        var dep = step.transit.departure_stop;
                        var arr = step.transit.arrival_stop;

                        [dep, arr].forEach(function (stop) {
                            if (!stop || !stop.location) return;
                            var marker = new google.maps.Marker({
                                map: map,
                                position: stop.location,
                                title: stop.name || 'Transit stop',
                                icon: {
                                    path: google.maps.SymbolPath.CIRCLE,
                                    scale: 7,
                                    fillColor: '#7c3aed',
                                    fillOpacity: 1,
                                    strokeColor: '#ffffff',
                                    strokeWeight: 2
                                }
                            });
                            activeTransitStopMarkers.push(marker);
                        });
                    });
                } catch (e) {
                    // fail silently; route still shows
                }
            }

            function drawTransitFullPath(directionsResult) {
                // Draw WALKING legs (dashed) + TRANSIT legs (solid) so the full journey is visible.
                try {
                    if (activeTransitPolylines && activeTransitPolylines.length) {
                        activeTransitPolylines.forEach(function (p) { p.setMap(null); });
                        activeTransitPolylines = [];
                    }

                    var route = directionsResult.routes && directionsResult.routes[0];
                    var leg = route && route.legs && route.legs[0];
                    var steps = (leg && leg.steps) || [];

                    // Fallback: if steps don't have paths, draw overview.
                    if (!steps.length || !steps.some(function (s) { return s && s.path && s.path.length; })) {
                        if (route && route.overview_path && route.overview_path.length) {
                            activeTransitPolylines.push(new google.maps.Polyline({
                                map: map,
                                path: route.overview_path,
                                strokeColor: '#7c3aed',
                                strokeOpacity: 0.95,
                                strokeWeight: 7
                            }));
                        }
                        return;
                    }

                    steps.forEach(function (step) {
                        if (!step || !step.path || !step.path.length) return;
                        var mode = (step.travel_mode || '').toUpperCase();

                        if (mode === 'WALKING') {
                            activeTransitPolylines.push(new google.maps.Polyline({
                                map: map,
                                path: step.path,
                                strokeOpacity: 0,
                                icons: [{
                                    icon: {
                                        path: 'M 0,-1 0,1',
                                        strokeOpacity: 1,
                                        strokeColor: '#2563eb',
                                        strokeWeight: 4
                                    },
                                    offset: '0',
                                    repeat: '14px'
                                }]
                            }));
                        } else if (mode === 'TRANSIT') {
                            activeTransitPolylines.push(new google.maps.Polyline({
                                map: map,
                                path: step.path,
                                strokeColor: '#7c3aed',
                                strokeOpacity: 0.95,
                                strokeWeight: 7
                            }));
                        } else {
                            activeTransitPolylines.push(new google.maps.Polyline({
                                map: map,
                                path: step.path,
                                strokeColor: '#7c3aed',
                                strokeOpacity: 0.75,
                                strokeWeight: 6
                            }));
                        }
                    });
                } catch (e) {
                    // ignore; renderer will still show something
                }
            }

            function getRouteStyle(travel_mode) {
                var mode = (travel_mode || '').toUpperCase();
                var color = '#de2e03'; // DRIVING default
                if (mode === 'WALKING') color = '#2563eb';
                if (mode === 'BICYCLING') color = '#10b981';
                if (mode === 'TRANSIT') color = '#7c3aed';

                return {
                    strokeColor: color,
                    strokeOpacity: 0.95,
                    strokeWeight: 8,
                    zIndex: 10
                };
            }

            function getRouteOutlineStyle() {
                return {
                    strokeColor: '#0b0b0c',
                    strokeOpacity: 0.35,
                    strokeWeight: 12,
                    zIndex: 9
                };
            }

            function initTimePicker() {
                $('#selected_datetime').datetimepicker({
                    format: 'YYYY-MM-DD HH:mm',
                    defaultDate: moment().add(30, 'minutes'),
                    minDate: moment().add(30, 'minutes')
                });
            }

            function displayRoute(travel_mode, origin, destination, directionsService, directionsDisplay, directionsDisplayOutline) {
                directionsService.route({
                    origin: origin, 
                    destination: destination, 
                    travelMode: travel_mode, 
                    avoidTolls: true
                }, function (response, status) {
                    if (status === 'OK') {
                        if (directionsDisplayOutline) {
                            directionsDisplayOutline.setMap(map);
                            directionsDisplayOutline.setDirections(response);
                        }
                        directionsDisplay.setMap(map);
                        directionsDisplay.setDirections(response);

                        if ((travel_mode || '').toUpperCase() === 'TRANSIT') {
                            addTransitStopMarkers(response);
                            drawTransitFullPath(response);
                        }
                    } else {
                        if (directionsDisplayOutline) {
                            directionsDisplayOutline.setMap(null);
                            directionsDisplayOutline.setDirections(null);
                        }
                        directionsDisplay.setMap(null);
                        directionsDisplay.setDirections(null);
                        showToast("Route Error", "Directions request failed due to " + status, "error");
                    }
                });
            }

            function calculateDistance(travel_mode, origin, destination) {
                var service = new google.maps.DistanceMatrixService();
                service.getDistanceMatrix({
                    origins: [origin],
                    destinations: [destination],
                    travelMode: travel_mode,
                    unitSystem: google.maps.UnitSystem.METRIC,
                    avoidHighways: false,
                    avoidTolls: false
                }, function (response, status) {
                    save_results(response, status);
                });
            }

            function save_results(response, status) {
                if (status !== google.maps.DistanceMatrixStatus.OK) {
                    showToast("Matrix Error", "Error: " + status, "error");
                } else {
                    try {
                        var pickupTimeInput = $('#selected_datetime');
                        var pickupTime;

                        if (pickupTimeInput.val()) {
                            // datetimepicker sometimes returns values with slightly different formats.
                            // Try strict first; if it fails, fall back to a more lenient parse.
                            pickupTime = moment(pickupTimeInput.val(), 'YYYY-MM-DD HH:mm', true);
                            if (!pickupTime.isValid()) {
                                setPickupNow();
                                pickupTime = moment($('#selected_datetime').val());
                            }
                            if (isReverse && pickupTime.isBefore(moment().add(30, 'minutes'))) {
                                alert('Please choose a pickup time at least 30 minutes from the current time.');
                                return;
                            }
                        } else {
                            setPickupNow();
                            // setPickupNow() sets #selected_datetime; re-parse it so cars are shown
                            pickupTime = moment($('#selected_datetime').val());
                        }

                        var carsList = [
                            { name: 'ViteGo', pickupTime: pickupTime.format('YYYY-MM-DD HH:mm') },
                            { name: 'ViteGo XL', pickupTime: pickupTime.format('YYYY-MM-DD HH:mm') },
                        ];

                        var distance = response.rows[0].elements[0].distance.text;
                        var durationInSeconds = response.rows[0].elements[0].duration.value;
                        var durationInMinutes = Math.ceil(durationInSeconds / 60);

                        var travel_mode = $('#travel_mode').val();
                        if (travel_mode && travel_mode.toUpperCase() !== 'DRIVING') {
                            showNonDrivingSummary(distance, durationInMinutes);
                            return;
                        }

                        displayCarList(carsList, durationInMinutes, parseFloat(distance));
                    } catch (error) {
                        console.error("Error processing API response:", error);
                        alert("Error processing API response: " + error.message);
                    }
                }
            }

            $('#distance_form').submit(function (e) {
                e.preventDefault();
                $('#route-summary').hide();
                var origin = $('#origin').val();
                var destination = $('#destination').val();
                var travel_mode = $('#travel_mode').val();
                var pickupTimeInput = $('#selected_datetime');
                var pickupTime;

                if (pickupTimeInput.val()) {
                    pickupTime = moment(pickupTimeInput.val(), 'YYYY-MM-DD HH:mm', true);
                    if (!pickupTime.isValid()) {
                        setPickupNow();
                        pickupTime = moment($('#selected_datetime').val());
                    }
                    if (isReverse && pickupTime.isBefore(moment().add(30, 'minutes'))) {
                        alert('Please choose a pickup time at least 30 minutes from the current time.');
                        return;
                    }
                } else {
                    setPickupNow();
                    // setPickupNow() sets #selected_datetime; continue so the trip can be calculated
                    pickupTime = moment($('#selected_datetime').val());
                }

                clearActiveRoute();

                var mode = (travel_mode || '').toUpperCase();
                if (mode === 'TRANSIT') {
                    // Use Google's default transit rendering (keeps full multi-segment transit path details).
                    activeDirectionsDisplayOutline = null;
                    activeDirectionsDisplay = new google.maps.DirectionsRenderer({
                        draggable: false,
                        suppressMarkers: false,
                        preserveViewport: false
                    });
                } else {
                    activeDirectionsDisplayOutline = new google.maps.DirectionsRenderer({
                        draggable: false,
                        suppressMarkers: true,
                        preserveViewport: false,
                        polylineOptions: getRouteOutlineStyle()
                    });

                    activeDirectionsDisplay = new google.maps.DirectionsRenderer({
                        draggable: false,
                        suppressMarkers: false,
                        preserveViewport: false,
                        polylineOptions: getRouteStyle(travel_mode)
                    });
                }
                var directionsService = new google.maps.DirectionsService();
                displayRoute(travel_mode, origin, destination, directionsService, activeDirectionsDisplay, activeDirectionsDisplayOutline);
                calculateDistance(travel_mode, origin, destination);
            });

            initTimePicker();
        });
    </script>
</body>
</html>
